<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Submit Result | Mahjong League</title><link rel="stylesheet" href="css/styles.css"></head>
<body><header><div class="header-inner"><div class="brand" data-league-name>Mahjong League</div><nav><a href="index.html">Leaderboard</a><a href="submit.html">Submit Result</a><a href="history.html">History</a><a href="rules.html">Rules</a><a href="scoring.html">Scoring</a><a href="settlement.html">Reset</a><a href="admin.html">Admin</a></nav></div></header>
<main><h1>Submit a result</h1><p class="lead">Enter your own starting and ending chips. An administrator will verify the result.</p><div id="message" class="hidden"></div>
<form id="result-form"><div class="card grid"><div><label for="player-id">Player</label><select id="player-id" required></select></div><div><label for="match-date">Match date</label><input id="match-date" type="date" required></div></div>
<div class="card"><h2>Starting chips</h2><div class="grid-4"><div class="chip-white"><label for="start-white">White × <span data-white-value>1</span></label><input id="start-white" type="number" min="0" step="1" required></div><div class="chip-red"><label for="start-red">Red × <span data-red-value>5</span></label><input id="start-red" type="number" min="0" step="1" required></div><div class="chip-blue"><label for="start-blue">Blue × <span data-blue-value>10</span></label><input id="start-blue" type="number" min="0" step="1" required></div><div class="chip-green"><label for="start-green">Green × <span data-green-value>25</span></label><input id="start-green" type="number" min="0" step="1" required></div></div></div>
<div class="card"><h2>Ending chips</h2><div class="grid-4"><div class="chip-white"><label for="end-white">White × <span data-white-value>1</span></label><input id="end-white" type="number" min="0" step="1" value="0" required></div><div class="chip-red"><label for="end-red">Red × <span data-red-value>5</span></label><input id="end-red" type="number" min="0" step="1" value="0" required></div><div class="chip-blue"><label for="end-blue">Blue × <span data-blue-value>10</span></label><input id="end-blue" type="number" min="0" step="1" value="0" required></div><div class="chip-green"><label for="end-green">Green × <span data-green-value>25</span></label><input id="end-green" type="number" min="0" step="1" value="0" required></div></div></div>
<div class="grid"><div class="stat"><span class="muted">Starting value</span><strong id="start-total">0</strong></div><div class="stat"><span class="muted">Ending value</span><strong id="end-total">0</strong></div></div><div class="card"><label for="notes">Note (optional)</label><textarea id="notes" placeholder="Table, round, correction, or other details"></textarea><p>Net change: <strong id="net-total">0</strong></p><button id="submit-button" type="submit">Submit for approval</button></div></form></main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="js/config.js"></script><script src="js/supabase-client.js"></script><script src="js/common.js"></script><script src="js/submission.js"></script></body></html>
